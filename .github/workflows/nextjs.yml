name: Redirect legacy GitHub Pages site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Create redirect site
        run: |
          mkdir -p redirect-site
          cat > redirect-site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Redirecting…</title>
              <meta http-equiv="refresh" content="0; url=https://www.div--vi.com/" />
              <script>
                (function () {
                  var targetOrigin = "https://www.div--vi.com";
                  var current = window.location;
                  var path = current.pathname.replace(/^\/myPortfolio/, "") || "/";
                  var target = targetOrigin + path + current.search + current.hash;
                  window.location.replace(target);
                })();
              </script>
              <style>
                body {
                  margin: 0;
                  min-height: 100vh;
                  display: grid;
                  place-items: center;
                  font-family: system-ui, sans-serif;
                  background: #faf7f2;
                  color: #1f1b16;
                }
                a { color: #2c5aa0; }
              </style>
            </head>
            <body>
              <p>Redirecting to <a href="https://www.div--vi.com/">www.div--vi.com</a>…</p>
            </body>
          </html>
          EOF
          cp redirect-site/index.html redirect-site/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./redirect-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
